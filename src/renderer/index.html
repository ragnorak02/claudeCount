<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ClaudeCount</title>
  </head>
  <body>
    <div id="app">
      <header id="header">
        <div id="header-left">
          <h1>ClaudeCount</h1>
          <span id="agent-count" class="agent-count">0 agents</span>
        </div>
        <div id="status-bar">
          <div id="connection-health" class="health-indicator" title="Pipeline health">
            <span class="health-dot"></span>
            <span class="health-label">--</span>
          </div>
          <span id="monitor-status" class="status-badge stopped">Stopped</span>
          <div id="sort-controls">
            <label for="sort-select">Sort:</label>
            <select id="sort-select">
              <option value="pid-asc">PID</option>
              <option value="start-newest">Newest first</option>
              <option value="start-oldest">Oldest first</option>
              <option value="status">Status</option>
            </select>
          </div>
          <button id="toggle-monitor">Start Monitoring</button>
        </div>
      </header>
      <!-- Mobile Access Panel -->
      <div id="mobile-panel" class="mobile-panel collapsed">
        <button id="mobile-panel-toggle" class="mobile-panel-toggle" type="button">
          Mobile Access
          <span id="mobile-panel-arrow" class="panel-arrow">&#9654;</span>
        </button>
        <div id="mobile-panel-body" class="mobile-panel-body">
          <div class="mobile-info-row">
            <span class="mobile-label">Local:</span>
            <span id="mobile-local-url" class="mobile-value mono">--</span>
          </div>
          <div class="mobile-info-row">
            <span class="mobile-label">Token:</span>
            <span id="mobile-token-display" class="mobile-value mono">********</span>
            <button id="mobile-copy-token" class="mobile-btn-sm" type="button">Copy</button>
          </div>
          <div class="mobile-info-row">
            <span class="mobile-label">QR:</span>
            <canvas id="mobile-qr-canvas" width="128" height="128" class="mobile-qr"></canvas>
          </div>
          <div class="mobile-info-row">
            <span class="mobile-label">Remote:</span>
            <span id="mobile-tunnel-url" class="mobile-value mono">Not running</span>
            <button id="mobile-tunnel-btn" class="mobile-btn-sm" type="button">Start Tunnel</button>
          </div>
          <div id="mobile-tunnel-status" class="mobile-tunnel-status"></div>
        </div>
      </div>

      <main id="dashboard">
        <div id="agent-grid"></div>
        <div id="empty-state" class="visible">
          <div class="empty-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </div>
          <p class="empty-title">No agents detected</p>
          <p class="empty-hint">Monitoring will begin automatically.</p>
        </div>
      </main>
    </div>
  </body>
</html>
